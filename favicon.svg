<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="6" fill="#3b82f6"/>

  <!-- Open book -->
  <g transform="translate(5, 7)">
    <!-- Left page -->
    <path d="M 1 2 L 10 4 L 10 17 L 1 15 Z" fill="#ffffff"/>
    <!-- Right page -->
    <path d="M 11 4 L 21 2 L 21 15 L 11 17 Z" fill="#f1f5f9"/>
    <!-- Center spine -->
    <line x1="11" y1="4" x2="11" y2="17" stroke="#1d4ed8" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Page lines -->
    <line x1="3" y1="6.5" x2="8.5" y2="7.5" stroke="#94a3b8" stroke-width="0.6" stroke-linecap="round"/>
    <line x1="3" y1="9" x2="8.5" y2="10" stroke="#94a3b8" stroke-width="0.6" stroke-linecap="round"/>
    <line x1="3" y1="11.5" x2="8" y2="12.4" stroke="#94a3b8" stroke-width="0.6" stroke-linecap="round"/>
    <line x1="13.5" y1="7.5" x2="19" y2="6.5" stroke="#94a3b8" stroke-width="0.6" stroke-linecap="round"/>
    <line x1="13.5" y1="10" x2="19" y2="9" stroke="#94a3b8" stroke-width="0.6" stroke-linecap="round"/>
    <line x1="13.5" y1="12.4" x2="18.5" y2="11.5" stroke="#94a3b8" stroke-width="0.6" stroke-linecap="round"/>
  </g>
</svg>
