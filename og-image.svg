<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="bookSpine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative top bar -->
  <rect x="0" y="0" width="1200" height="8" fill="#3b82f6"/>

  <!-- Decorative floating books (background) -->
  <g opacity="0.08">
    <rect x="120" y="120" width="80" height="110" rx="4" fill="#1e293b" transform="rotate(-12 160 175)"/>
    <rect x="950" y="420" width="90" height="125" rx="4" fill="#1e293b" transform="rotate(15 995 482)"/>
    <rect x="1020" y="140" width="70" height="100" rx="4" fill="#1e293b" transform="rotate(-8 1055 190)"/>
  </g>

  <!-- Main book icon (left) -->
  <g transform="translate(180, 195)">
    <!-- Book shadow -->
    <rect x="12" y="14" width="200" height="240" rx="10" fill="#1e293b" opacity="0.15"/>
    <!-- Book back cover -->
    <rect x="0" y="0" width="200" height="240" rx="10" fill="url(#bookSpine)"/>
    <!-- Open pages -->
    <path d="M 30 20 L 100 40 L 100 220 L 30 200 Z" fill="#ffffff"/>
    <path d="M 100 40 L 170 20 L 170 200 L 100 220 Z" fill="#f1f5f9"/>
    <!-- Page lines -->
    <line x1="45" y1="60" x2="85" y2="70" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
    <line x1="45" y1="80" x2="85" y2="90" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
    <line x1="45" y1="100" x2="80" y2="108" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
    <line x1="115" y1="70" x2="155" y2="60" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
    <line x1="115" y1="90" x2="155" y2="80" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
    <line x1="115" y1="108" x2="150" y2="100" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="450" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="84" font-weight="800" fill="#1e293b" letter-spacing="-2">z-library</text>

  <!-- Subtitle -->
  <text x="450" y="335" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="32" font-weight="500" fill="#475569">免费电子书图书馆</text>

  <!-- Tagline -->
  <text x="450" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="400" fill="#64748b">数百万本 PDF · EPUB · MOBI</text>

  <!-- Feature pills -->
  <g transform="translate(450, 440)">
    <g>
      <rect x="0" y="0" width="120" height="42" rx="21" fill="#dcfce7"/>
      <text x="60" y="28" font-family="-apple-system, Arial, sans-serif" font-size="18" font-weight="700" fill="#15803d" text-anchor="middle">无需注册</text>
    </g>
    <g transform="translate(135, 0)">
      <rect x="0" y="0" width="120" height="42" rx="21" fill="#dbeafe"/>
      <text x="60" y="28" font-family="-apple-system, Arial, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8" text-anchor="middle">快速下载</text>
    </g>
    <g transform="translate(270, 0)">
      <rect x="0" y="0" width="120" height="42" rx="21" fill="#fef3c7"/>
      <text x="60" y="28" font-family="-apple-system, Arial, sans-serif" font-size="18" font-weight="700" fill="#b45309" text-anchor="middle">永久免费</text>
    </g>
  </g>

  <!-- URL footer -->
  <text x="450" y="565" font-family="-apple-system, Arial, sans-serif" font-size="22" font-weight="600" fill="#3b82f6">zlib-rary.github.io</text>

  <!-- Bottom decorative bar -->
  <rect x="0" y="622" width="1200" height="8" fill="#1e293b"/>
</svg>
